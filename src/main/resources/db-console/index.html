<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Console</title>
  <!-- CodeMirror 5 (SQL editor) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/theme/dracula.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/addon/hint/show-hint.min.css"/>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; background: #1e1f22; color: #cdd6f4; }

    /* ===== Layout ===== */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ===== Header ===== */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 46px; min-height: 46px;
      background: #181920; border-bottom: 1px solid #313244;
      user-select: none;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #cba6f7; white-space: nowrap; }
    .header-logo svg { flex-shrink: 0; }
    .ds-selector { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
    .ds-selector label { color: #a6adc8; font-size: 12px; }
    select, input[type=number] {
      background: #313244; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 6px; padding: 4px 8px; font-size: 12px; outline: none; cursor: pointer;
    }
    select:focus, input:focus { border-color: #cba6f7; }
    .ds-badge { font-size: 11px; background: #45475a; border-radius: 4px; padding: 2px 7px; color: #a6adc8; }
    .ds-badge.primary { background: #1e3a5f; color: #89b4fa; }
    .spacer { flex: 1; }
    .header-status { font-size: 11px; color: #6c7086; }

    /* ===== Main area ===== */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 240px; min-width: 140px; max-width: 420px;
      background: #181920; border-right: 1px solid #313244;
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    .sidebar-header {
      padding: 8px 10px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: #6c7086; border-bottom: 1px solid #313244;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .sidebar-body::-webkit-scrollbar { width: 5px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    /* ===== Resize handle ===== */
    .resize-handle {
      position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
      cursor: col-resize; background: transparent; z-index: 10;
    }
    .resize-handle:hover { background: #cba6f7; }

    /* ===== Tree ===== */
    .tree-node { list-style: none; }
    .tree-item {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px 3px 4px; cursor: pointer; border-radius: 4px; margin: 1px 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none;
    }
    .tree-item:hover { background: #313244; }
    .tree-item.active { background: #45475a; }
    .tree-item .arrow { display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; flex-shrink: 0; transition: transform .15s; color: #6c7086; font-size: 10px; }
    .tree-item.open > .arrow { transform: rotate(90deg); }
    .tree-item .icon { font-size: 13px; flex-shrink: 0; }
    .tree-item .label { overflow: hidden; text-overflow: ellipsis; flex: 1; font-size: 12px; }
    .tree-item .type-badge { font-size: 10px; background: #313244; border-radius: 3px; padding: 0 4px; color: #6c7086; }
    .tree-children { padding-left: 14px; }
    .tree-loading { color: #6c7086; font-size: 11px; padding: 3px 8px 3px 28px; }

    /* ===== Column nodes ===== */
    .col-pk { color: #f9e2af; }
    .col-nullable { color: #6c7086; }
    .col-type { font-size: 10px; color: #6c7086; margin-left: 4px; }

    /* ===== Content area ===== */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ===== Editor panel ===== */
    .editor-panel { display: flex; flex-direction: column; border-bottom: 3px solid #313244; min-height: 140px; position: relative; }
    .editor-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #1e1f22; border-bottom: 1px solid #313244;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 500; transition: background .15s;
    }
    .btn-primary { background: #cba6f7; color: #1e1e2e; }
    .btn-primary:hover { background: #d0b4f7; }
    .btn-primary:active { background: #b899e0; }
    .btn-secondary { background: #313244; color: #cdd6f4; border: 1px solid #45475a; }
    .btn-secondary:hover { background: #45475a; }
    .btn-danger  { background: #f38ba8; color: #1e1e2e; }
    .btn-danger:hover  { background: #f5a0b8; }
    .btn-sm { padding: 3px 8px; font-size: 11px; }
    .toolbar-sep { width: 1px; height: 18px; background: #313244; }
    .limit-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a6adc8; }
    .limit-wrap select { padding: 2px 6px; }
    .editor-wrap { flex: 1; position: relative; overflow: hidden; }
    .editor-wrap .CodeMirror { height: 100%; font-size: 13px; line-height: 1.6; font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace; }
    /* fallback textarea when CodeMirror fails to load */
    #sql-fallback {
      display: none; width: 100%; height: 100%; resize: none;
      background: #1e1e2e; color: #cdd6f4; border: none; padding: 10px;
      font-family: "JetBrains Mono", "Consolas", monospace; font-size: 13px; outline: none;
    }

    /* ===== Resize handle for editor/results split ===== */
    .h-resize {
      height: 5px; background: #313244; cursor: row-resize; position: relative; z-index: 5;
      flex-shrink: 0;
    }
    .h-resize:hover { background: #cba6f7; }

    /* ===== Results panel ===== */
    .results-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .results-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px; background: #181920; border-bottom: 1px solid #313244; flex-shrink: 0;
    }
    .results-info { font-size: 11px; color: #a6adc8; }
    .results-info .ok  { color: #a6e3a1; }
    .results-info .err { color: #f38ba8; }
    .results-info .upd { color: #89dceb; }
    .results-body { flex: 1; overflow: auto; }
    .results-body::-webkit-scrollbar { width: 7px; height: 7px; }
    .results-body::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    /* ===== Data Table ===== */
    .data-table { border-collapse: collapse; width: 100%; font-size: 12px; }
    .data-table th {
      position: sticky; top: 0; background: #181920; color: #a6adc8;
      padding: 6px 12px; text-align: left; font-weight: 600; letter-spacing: .04em;
      border-bottom: 1px solid #313244; white-space: nowrap; user-select: none;
    }
    .data-table th.sortable { cursor: pointer; }
    .data-table th.sortable:hover { color: #cba6f7; }
    .data-table td { padding: 4px 12px; border-bottom: 1px solid #1e1f22; color: #cdd6f4; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .data-table tr:hover td { background: #262638; }
    .data-table .null-val { color: #45475a; font-style: italic; }
    .data-table .num-val { color: #fab387; text-align: right; }
    .data-table .bool-true  { color: #a6e3a1; }
    .data-table .bool-false { color: #f38ba8; }
    .row-num { color: #45475a; font-size: 11px; user-select: none; }

    /* ===== Error / empty states ===== */
    .error-box { background: #3b1f2b; border: 1px solid #f38ba8; border-radius: 8px; padding: 12px 16px; margin: 12px; color: #f38ba8; font-size: 12px; font-family: monospace; white-space: pre-wrap; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #6c7086; gap: 8px; }
    .empty-state svg { opacity: .3; }
    .empty-state p { font-size: 13px; }

    /* ===== Context menu ===== */
    .ctx-menu {
      position: fixed; background: #313244; border: 1px solid #45475a; border-radius: 8px;
      padding: 4px; min-width: 160px; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .ctx-item { padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .ctx-item:hover { background: #45475a; color: #cba6f7; }
    .ctx-sep { height: 1px; background: #45475a; margin: 3px 0; }

    /* ===== Scrollbar general ===== */
    * { scrollbar-width: thin; scrollbar-color: #45475a #1e1f22; }

    /* ===== Tooltip ===== */
    [title] { position: relative; cursor: default; }
  </style>
</head>
<body>
<div class="app">
  <!-- ══════════ HEADER ══════════ -->
  <header class="header">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
      DB Console
    </div>
    <div class="ds-selector">
      <label>DataSource:</label>
      <select id="ds-select" title="Select active datasource"></select>
      <span id="ds-badge" class="ds-badge" style="display:none"></span>
    </div>
    <span id="db-meta" class="header-status"></span>
    <div class="spacer"></div>
    <span class="header-status" id="header-status"></span>
  </header>

  <!-- ══════════ MAIN ══════════ -->
  <div class="main">
    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Schema Browser</span>
        <button class="btn btn-secondary btn-sm" onclick="App.refreshTree()" title="Refresh">↺</button>
      </div>
      <div class="sidebar-body" id="schema-tree">
        <div class="empty-state" style="height:80px">
          <p>Select a datasource</p>
        </div>
      </div>
      <div class="resize-handle" id="sidebar-resize"></div>
    </aside>

    <!-- ── Content ── -->
    <div class="content">
      <!-- Editor panel -->
      <div class="editor-panel" id="editor-panel">
        <div class="editor-toolbar">
          <button class="btn btn-primary" id="run-btn" onclick="App.execute()" title="Execute (Ctrl+Enter)">
            ▶ Run
          </button>
          <button class="btn btn-secondary" onclick="App.clearEditor()" title="Clear editor">✕ Clear</button>
          <div class="toolbar-sep"></div>
          <div class="limit-wrap">
            <label for="max-rows-sel">Limit</label>
            <select id="max-rows-sel">
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
              <option value="5000">5000</option>
            </select>
          </div>
          <div class="toolbar-sep"></div>
          <div class="limit-wrap">
            <label>Schema:</label>
            <select id="schema-ctx-sel" title="Active schema context for queries">
              <option value="">(default)</option>
            </select>
          </div>
          <div class="spacer"></div>
          <button class="btn btn-secondary btn-sm" onclick="App.exportCsv()" title="Export last results as CSV">↓ Export CSV</button>
        </div>
        <div class="editor-wrap">
          <div id="editor"></div>
          <textarea id="sql-fallback" placeholder="SELECT * FROM your_table LIMIT 100;&#10;-- Ctrl+Enter to execute"></textarea>
        </div>
      </div>

      <!-- Vertical resize handle -->
      <div class="h-resize" id="editor-resize"></div>

      <!-- Results panel -->
      <div class="results-panel">
        <div class="results-toolbar">
          <span id="results-info" class="results-info">Ready.</span>
        </div>
        <div class="results-body" id="results-body">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M3 15h18M9 3v18"/>
            </svg>
            <p>Execute a query to see results</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/sql/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/hint/show-hint.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/hint/sql-hint.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/comment/comment.min.js"></script>
<script>
(function () {
  'use strict';

  var BASE = '__BASE_PATH__';

  /* ═══════════════════════════════════════════════════════════
   *  API helpers
   * ═══════════════════════════════════════════════════════════ */
  var api = {
    get: function (path) {
      return fetch(BASE + path).then(function (r) {
        if (!r.ok) return r.json().then(function (e) { throw new Error(e.error || r.statusText); });
        return r.json();
      });
    },
    post: function (path, body) {
      return fetch(BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (e) { throw new Error(e.error || r.statusText); });
        return r.json();
      });
    }
  };

  /* ═══════════════════════════════════════════════════════════
   *  State
   * ═══════════════════════════════════════════════════════════ */
  var state = {
    datasources: [],
    currentDs: null,
    lastResult: null,
    expandedNodes: {},   // key → true
    completionByDs: {}   // dsName -> { loaded, loading, keywords, tables, columns, qualifiedTables, qualifiedColumns, tableColumns }
  };

  /* ═══════════════════════════════════════════════════════════
   *  CodeMirror setup
   * ═══════════════════════════════════════════════════════════ */
  var editor = null;

  var SQL_KEYWORDS = [
    'SELECT', 'FROM', 'WHERE', 'GROUP BY', 'ORDER BY', 'HAVING', 'LIMIT', 'OFFSET',
    'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM', 'MERGE',
    'JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'FULL JOIN', 'ON',
    'CREATE TABLE', 'ALTER TABLE', 'DROP TABLE', 'TRUNCATE TABLE',
    'CREATE INDEX', 'DROP INDEX', 'PRIMARY KEY', 'FOREIGN KEY',
    'DISTINCT', 'AS', 'AND', 'OR', 'NOT', 'IN', 'EXISTS', 'BETWEEN', 'LIKE', 'IS NULL',
    'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'UNION', 'UNION ALL',
    'COUNT', 'SUM', 'AVG', 'MIN', 'MAX'
  ];

  function getCompletionState(dsName) {
    if (!dsName) return null;
    if (!state.completionByDs[dsName]) {
      state.completionByDs[dsName] = {
        loaded: false,
        loading: false,
        keywords: SQL_KEYWORDS.slice(),
        tables: [],
        columns: [],
        qualifiedTables: [],
        qualifiedColumns: [],
        tableColumns: {}
      };
    }
    return state.completionByDs[dsName];
  }

  function normalizeIdent(raw) {
    if (!raw) return '';
    return String(raw)
            .trim()
            .replace(/^"|"$/g, '')
            .replace(/^`|`$/g, '')
            .replace(/^\[|\]$/g, '')
            .toLowerCase();
  }

  function isSqlKeyword(word) {
    if (!word) return false;
    var w = normalizeIdent(word);
    return [
      'on', 'where', 'group', 'order', 'having', 'limit', 'offset', 'join', 'left', 'right',
      'inner', 'full', 'cross', 'union', 'and', 'or', 'when', 'then', 'else'
    ].indexOf(w) !== -1;
  }

  function getSqlBeforeCursor(cm) {
    var cursor = cm.getCursor();
    return cm.getRange(CodeMirror.Pos(0, 0), cursor);
  }

  function parseAliases(sql) {
    var aliases = {};
    var re = /\b(?:from|join)\s+((?:"[^"]+"|`[^`]+`|\[[^\]]+\]|[\w$]+)(?:\s*\.\s*(?:"[^"]+"|`[^`]+`|\[[^\]]+\]|[\w$]+))*)\s+(?:as\s+)?("[^"]+"|`[^`]+`|\[[^\]]+\]|[\w$]+)/gi;
    var m;
    while ((m = re.exec(sql)) !== null) {
      var tableRef = (m[1] || '').replace(/\s+/g, '');
      var alias = m[2] || '';
      if (!tableRef || !alias || isSqlKeyword(alias)) continue;
      aliases[normalizeIdent(alias)] = tableRef;
    }
    return aliases;
  }

  function getTableNameTail(tableRef) {
    if (!tableRef) return '';
    var parts = String(tableRef).split('.');
    return normalizeIdent(parts[parts.length - 1]);
  }

  function getColumnsForAlias(alias, aliases, dsState) {
    if (!alias || !aliases || !dsState) return [];
    var aliasKey = normalizeIdent(alias);
    var tableRef = aliases[aliasKey];
    if (!tableRef) return [];

    var tableKey = normalizeIdent(tableRef);
    if (dsState.tableColumns[tableKey]) {
      return dsState.tableColumns[tableKey];
    }

    var tail = getTableNameTail(tableRef);
    return dsState.tableColumns[tail] || [];
  }

  function makeCompletionList(pool, needle) {
    var seen = {};
    var list = [];
    pool.forEach(function (item) {
      if (!item) return;
      var key = item.toUpperCase();
      if (seen[key]) return;
      if (!needle || key.indexOf(needle) === 0) {
        seen[key] = true;
        list.push(item);
      }
    });
    list.sort(function (a, b) {
      return a.localeCompare(b);
    });
    return list;
  }

  function uniquePush(list, value, seen) {
    if (!value || seen[value]) return;
    seen[value] = true;
    list.push(value);
  }

  function fetchAutocompleteMetadata(dsName) {
    var dsState = getCompletionState(dsName);
    if (!dsState || dsState.loaded || dsState.loading) return Promise.resolve(dsState);

    dsState.loading = true;

    return api.get('/api/datasources/' + encodeURIComponent(dsName) + '/schemas')
      .then(function (schemasMap) {
        var tableCalls = [];
        Object.keys(schemasMap || {}).forEach(function (catalog) {
          var schemas = schemasMap[catalog] || [];
          var catalogValue = (catalog === 'null' || catalog === null || catalog === '') ? null : catalog;

          if (!schemas.length) {
            var paramsNoSchema = [];
            if (catalogValue) paramsNoSchema.push('catalog=' + encodeURIComponent(catalogValue));
            var qsNoSchema = paramsNoSchema.length ? '?' + paramsNoSchema.join('&') : '';
            tableCalls.push(
              api.get('/api/datasources/' + encodeURIComponent(dsName) + '/tables' + qsNoSchema)
                .then(function (tables) {
                  return { catalog: catalogValue, schema: null, tables: tables || [] };
                })
            );
            return;
          }

          schemas.forEach(function (schema) {
            var params = [];
            if (catalogValue) params.push('catalog=' + encodeURIComponent(catalogValue));
            if (schema) params.push('schema=' + encodeURIComponent(schema));
            var qs = params.length ? '?' + params.join('&') : '';
            tableCalls.push(
              api.get('/api/datasources/' + encodeURIComponent(dsName) + '/tables' + qs)
                .then(function (tables) {
                  return { catalog: catalogValue, schema: schema || null, tables: tables || [] };
                })
            );
          });
        });
        return Promise.all(tableCalls);
      })
      .then(function (tableGroups) {
        var tableSeen = {};
        var qualifiedTableSeen = {};
        var columnSeen = {};
        var qualifiedColumnSeen = {};
        var columnCalls = [];

        (tableGroups || []).forEach(function (group) {
          (group.tables || []).forEach(function (t) {
            uniquePush(dsState.tables, t.name, tableSeen);

            var schemaPrefix = group.schema ? group.schema + '.' : '';
            uniquePush(dsState.qualifiedTables, schemaPrefix + t.name, qualifiedTableSeen);

            var colParams = [];
            if (group.catalog) colParams.push('catalog=' + encodeURIComponent(group.catalog));
            if (group.schema) colParams.push('schema=' + encodeURIComponent(group.schema));
            colParams.push('table=' + encodeURIComponent(t.name));

            columnCalls.push(
              api.get('/api/datasources/' + encodeURIComponent(dsName) + '/columns?' + colParams.join('&'))
                .then(function (cols) {
                  var tableKey = normalizeIdent(t.name);
                  var qualifiedTableKey = normalizeIdent((group.schema ? group.schema + '.' : '') + t.name);
                  if (!dsState.tableColumns[tableKey]) dsState.tableColumns[tableKey] = [];
                  if (!dsState.tableColumns[qualifiedTableKey]) dsState.tableColumns[qualifiedTableKey] = [];

                  var tableColsSeen = {};
                  dsState.tableColumns[tableKey].forEach(function (existingCol) {
                    tableColsSeen[normalizeIdent(existingCol)] = true;
                  });

                  (cols || []).forEach(function (c) {
                    uniquePush(dsState.columns, c.name, columnSeen);
                    uniquePush(dsState.qualifiedColumns, t.name + '.' + c.name, qualifiedColumnSeen);
                    if (group.schema) {
                      uniquePush(dsState.qualifiedColumns, group.schema + '.' + t.name + '.' + c.name, qualifiedColumnSeen);
                    }

                    var colName = c.name;
                    if (!tableColsSeen[normalizeIdent(colName)]) {
                      dsState.tableColumns[tableKey].push(colName);
                      dsState.tableColumns[qualifiedTableKey].push(colName);
                      tableColsSeen[normalizeIdent(colName)] = true;
                    }
                  });
                })
            );
          });
        });

        return Promise.all(columnCalls);
      })
      .then(function () {
        dsState.loaded = true;
        dsState.loading = false;
        return dsState;
      })
      .catch(function () {
        dsState.loading = false;
        return dsState;
      });
  }

  function getWordRange(token, cursor) {
    var text = token && token.string ? token.string : '';
    var start = token ? token.start : cursor.ch;
    var end = token ? token.end : cursor.ch;
    var isWord = /^[\w.$"]+$/.test(text);
    if (!isWord) {
      start = cursor.ch;
      end = cursor.ch;
      text = '';
    }
    return { start: start, end: end, word: text };
  }

  function sqlComplete(cm) {
    var dsState = getCompletionState(state.currentDs);
    var cursor = cm.getCursor();
    var token = cm.getTokenAt(cursor);
    var range = getWordRange(token, cursor);
    var needle = (range.word || '').toUpperCase();
    var sqlBeforeCursor = getSqlBeforeCursor(cm);

    // Alias-aware completion: after d.<Ctrl+Space> suggest columns from aliased table.
    var aliasAccessMatch = /([A-Za-z_][\w$]*)\.([A-Za-z_][\w$]*)?$/.exec(sqlBeforeCursor);
    if (aliasAccessMatch && dsState) {
      var alias = aliasAccessMatch[1];
      var memberPrefix = aliasAccessMatch[2] || '';
      var aliases = parseAliases(sqlBeforeCursor);
      var aliasCols = getColumnsForAlias(alias, aliases, dsState);
      if (aliasCols.length) {
        return {
          list: makeCompletionList(aliasCols, memberPrefix.toUpperCase()),
          from: CodeMirror.Pos(cursor.line, cursor.ch - memberPrefix.length),
          to: CodeMirror.Pos(cursor.line, cursor.ch)
        };
      }
    }

    var pool = [];
    if (dsState) {
      pool = dsState.keywords
        .concat(dsState.tables)
        .concat(dsState.qualifiedTables)
        .concat(dsState.columns)
        .concat(dsState.qualifiedColumns);
    } else {
      pool = SQL_KEYWORDS.slice();
    }

    var list = makeCompletionList(pool, needle);

    return {
      list: list,
      from: CodeMirror.Pos(cursor.line, range.start),
      to: CodeMirror.Pos(cursor.line, range.end)
    };
  }

  function triggerSqlComplete() {
    if (!editor || typeof CodeMirror === 'undefined') return;
    fetchAutocompleteMetadata(state.currentDs).finally(function () {
      editor.showHint({ hint: sqlComplete, completeSingle: false });
    });
  }

  function initEditor() {
    var el = document.getElementById('editor');
    if (typeof CodeMirror === 'undefined') {
      document.getElementById('sql-fallback').style.display = 'block';
      el.style.display = 'none';
      return;
    }
    editor = CodeMirror(el, {
      value: '-- Welcome to DB Console\n-- Press Ctrl+Enter to execute\n\n',
      mode: 'text/x-sql',
      theme: 'dracula',
      lineNumbers: true,
      matchBrackets: true,
      autoCloseBrackets: true,
      indentWithTabs: false,
      tabSize: 2,
      extraKeys: {
        'Ctrl-Enter': function () { App.execute(); },
        'Cmd-Enter':  function () { App.execute(); },
        'Ctrl-/':     function (cm) { cm.execCommand('toggleComment'); },
        'Ctrl-Space': function () { triggerSqlComplete(); },
        'Cmd-Space':  function () { triggerSqlComplete(); }
      },
      hintOptions: { completeSingle: false }
    });
    editor.on('inputRead', function (cm, change) {
      if (!change || !change.text || !change.text.length) return;
      var ch = change.text[0];
      if (/^[a-zA-Z_.]$/.test(ch)) {
        cm.showHint({ hint: sqlComplete, completeSingle: false });
      }
    });
    editor.setSize('100%', '100%');
  }

  function getSql() {
    if (editor) {
      var sel = editor.getSelection();
      return sel.trim() || editor.getValue();
    }
    return document.getElementById('sql-fallback').value;
  }

  function setSql(sql) {
    if (editor) editor.setValue(sql);
    else document.getElementById('sql-fallback').value = sql;
  }

  /* ═══════════════════════════════════════════════════════════
   *  Main App object
   * ═══════════════════════════════════════════════════════════ */
  window.App = {

    init: function () {
      initEditor();
      setupResizers();
      setupContextMenu();
      this.loadDatasources();
    },

    /* ---------- Datasources ---------- */
    loadDatasources: function () {
      var self = this;
      setStatus('Loading datasources…');
      api.get('/api/datasources').then(function (list) {
        state.datasources = list;
        var sel = document.getElementById('ds-select');
        sel.innerHTML = '';
        if (!list.length) {
          sel.innerHTML = '<option value="">— no datasources found —</option>';
          setStatus('No datasources found');
          return;
        }
        list.forEach(function (ds) {
          var opt = document.createElement('option');
          opt.value = ds.name;
          opt.textContent = ds.name + (ds.primary ? ' ★' : '');
          sel.appendChild(opt);
        });
        // auto-select primary or first
        var primary = list.find(function (d) { return d.primary; }) || list[0];
        sel.value = primary.name;
        self.selectDatasource(primary.name);
      }).catch(function (e) {
        setStatus('Error: ' + e.message);
      });
    },

    selectDatasource: function (name) {
      state.currentDs = name;
      fetchAutocompleteMetadata(name);
      var ds = state.datasources.find(function (d) { return d.name === name; });
      if (ds) {
        var badge = document.getElementById('ds-badge');
        badge.style.display = '';
        badge.textContent = ds.productName || ds.driverClass || '';
        badge.className = 'ds-badge' + (ds.primary ? ' primary' : '');
        document.getElementById('db-meta').textContent =
          (ds.productVersion ? ds.productName + ' ' + ds.productVersion : '') +
          (ds.url ? '  ·  ' + ds.url : '');
      }
      state.expandedNodes = {};
      this.refreshTree();
    },

    refreshTree: function () {
      if (!state.currentDs) return;
      var tree = document.getElementById('schema-tree');
      tree.innerHTML = '<div class="tree-loading">Loading…</div>';
      var self = this;
      api.get('/api/datasources/' + encodeURIComponent(state.currentDs) + '/schemas')
        .then(function (schemas) {
          self.renderTree(schemas);
        })
        .catch(function (e) {
          tree.innerHTML = '<div class="error-box">'+escHtml(e.message)+'</div>';
        });
    },

    renderTree: function (schemasMap) {
      var tree = document.getElementById('schema-tree');
      tree.innerHTML = '';
      var ul = document.createElement('ul');
      ul.className = 'tree-node';

      var catalogs = Object.keys(schemasMap);
      if (catalogs.length === 0) {
        tree.innerHTML = '<div class="tree-loading">No schemas found</div>';
        return;
      }

      // Update schema context selector
      var schemaCtx = document.getElementById('schema-ctx-sel');
      schemaCtx.innerHTML = '<option value="">(default)</option>';

      catalogs.forEach(function (catalog) {
        var schemas = schemasMap[catalog];

        if (catalog !== 'null' && catalog !== null && catalog !== '') {
          // Has catalogs
          var catalogLi = makeTreeItem('📁', catalog, null, 'catalog', null);
          ul.appendChild(catalogLi);
          if (schemas && schemas.length > 0) {
            var children = document.createElement('ul');
            children.className = 'tree-children';
            schemas.forEach(function (schema) {
              var schemaLi = buildSchemaNode(catalog, schema);
              children.appendChild(schemaLi);
              addSchemaOption(schemaCtx, catalog, schema);
            });
            catalogLi.appendChild(children);
            setupToggle(catalogLi);
          }
        } else {
          // No catalog grouping
          if (schemas && schemas.length > 0) {
            schemas.forEach(function (schema) {
              var schemaLi = buildSchemaNode(null, schema);
              ul.appendChild(schemaLi);
              addSchemaOption(schemaCtx, null, schema);
            });
          } else {
            // DB has neither catalogs nor schemas (e.g. older MySQL, H2 default)
            var li = buildSchemaNode(null, null);
            ul.appendChild(li);
          }
        }
      });

      tree.appendChild(ul);
    },

    /* ---------- Query execution ---------- */
    execute: function () {
      var sql = getSql().trim();
      if (!sql) return;
      if (!state.currentDs) { alert('No datasource selected'); return; }

      var maxRows = parseInt(document.getElementById('max-rows-sel').value, 10);
      var schema  = document.getElementById('schema-ctx-sel').value;

      setResultsInfo('<span>Executing…</span>');
      document.getElementById('results-body').innerHTML =
        '<div class="empty-state"><p>Executing…</p></div>';
      setStatus('Executing…');

      var self = this;
      var body = { sql: sql, maxRows: maxRows, schema: schema || null };
      api.post('/api/datasources/' + encodeURIComponent(state.currentDs) + '/execute', body)
        .then(function (result) {
          state.lastResult = result;
          self.renderResult(result);
        })
        .catch(function (e) {
          setResultsInfo('<span class="err">✕ Error: ' + escHtml(e.message) + '</span>');
          document.getElementById('results-body').innerHTML =
            '<div class="error-box">'+escHtml(e.message)+'</div>';
          setStatus('Error');
        });
    },

    renderResult: function (result) {
      if (result.type === 'ERROR') {
        setResultsInfo('<span class="err">✕ Error  ·  ' + result.executionTimeMs + 'ms</span>');
        document.getElementById('results-body').innerHTML =
          '<div class="error-box">'+escHtml(result.error)+'</div>';
        setStatus('Error');
        return;
      }
      if (result.type === 'UPDATE') {
        setResultsInfo('<span class="upd">✓ ' + result.updateCount + ' row(s) affected  ·  ' + result.executionTimeMs + 'ms</span>');
        document.getElementById('results-body').innerHTML =
          '<div class="empty-state"><p>✓ ' + result.updateCount + ' row(s) affected</p></div>';
        setStatus('Done in ' + result.executionTimeMs + 'ms');
        return;
      }

      var rows = result.rows || [];
      var cols = result.columns || [];
      setResultsInfo(
        '<span class="ok">✓ ' + rows.length + ' row' + (rows.length !== 1 ? 's' : '') +
        '  ·  ' + result.executionTimeMs + 'ms</span>'
      );
      setStatus(rows.length + ' rows in ' + result.executionTimeMs + 'ms');

      if (rows.length === 0) {
        document.getElementById('results-body').innerHTML =
          '<div class="empty-state"><p>Query returned 0 rows</p></div>';
        return;
      }

      var table = document.createElement('table');
      table.className = 'data-table';

      // Head
      var thead = document.createElement('thead');
      var tr = document.createElement('tr');
      var thNum = document.createElement('th');
      thNum.textContent = '#';
      tr.appendChild(thNum);
      cols.forEach(function (c) {
        var th = document.createElement('th');
        th.textContent = c;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      table.appendChild(thead);

      // Body
      var tbody = document.createElement('tbody');
      rows.forEach(function (row, idx) {
        var tr2 = document.createElement('tr');
        var tdNum = document.createElement('td');
        tdNum.className = 'row-num';
        tdNum.textContent = idx + 1;
        tr2.appendChild(tdNum);
        row.forEach(function (val) {
          var td = document.createElement('td');
          if (val === null || val === undefined) {
            td.textContent = 'NULL';
            td.className = 'null-val';
          } else if (typeof val === 'boolean') {
            td.textContent = String(val);
            td.className = val ? 'bool-true' : 'bool-false';
          } else if (typeof val === 'number') {
            td.textContent = String(val);
            td.className = 'num-val';
          } else {
            td.textContent = String(val);
            td.title = String(val);
          }
          tr2.appendChild(td);
        });
        tbody.appendChild(tr2);
      });
      table.appendChild(tbody);

      var body = document.getElementById('results-body');
      body.innerHTML = '';
      body.appendChild(table);
    },

    /* ---------- Preview table ---------- */
    previewTable: function (catalog, schema, table) {
      var sql = 'SELECT * FROM ' + (schema ? '"' + schema + '".' : '') + '"' + table + '"';
      setSql(sql);
      var schemaCtx = document.getElementById('schema-ctx-sel');
      if (schema) {
        for (var i = 0; i < schemaCtx.options.length; i++) {
          if (schemaCtx.options[i].value === schema) {
            schemaCtx.selectedIndex = i; break;
          }
        }
      }
      this.execute();
    },

    /* ---------- Clear ---------- */
    clearEditor: function () { setSql(''); },

    /* ---------- Export CSV ---------- */
    exportCsv: function () {
      var sql = getSql().trim();
      if (!sql) { alert('No query to export'); return; }
      if (!state.currentDs) { alert('No datasource selected'); return; }
      var schema = document.getElementById('schema-ctx-sel').value;
      var body = JSON.stringify({ sql: sql, maxRows: 100000, schema: schema || null });
      fetch(BASE + '/api/datasources/' + encodeURIComponent(state.currentDs) + '/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body
      }).then(function (r) { return r.blob(); })
        .then(function (blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'query-result.csv'; a.click();
          URL.revokeObjectURL(url);
        });
    }
  };

  /* ═══════════════════════════════════════════════════════════
   *  Tree helpers
   * ═══════════════════════════════════════════════════════════ */
  function buildSchemaNode(catalog, schema) {
    var label = schema || '(default)';
    var li = makeTreeItem('🗂', label, null, 'schema', null);
    li.dataset.catalog = catalog || '';
    li.dataset.schema = schema || '';

    var children = document.createElement('ul');
    children.className = 'tree-children';
    children.style.display = 'none';
    li.appendChild(children);

    var item = li.querySelector('.tree-item');
    item.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = children.style.display !== 'none';
      if (isOpen) {
        children.style.display = 'none';
        item.classList.remove('open');
      } else {
        if (children.childElementCount === 0) {
          loadTables(catalog, schema, children, item);
        } else {
          children.style.display = '';
          item.classList.add('open');
        }
      }
    });
    return li;
  }

  function loadTables(catalog, schema, container, parentItem) {
    container.innerHTML = '<li class="tree-loading">Loading…</li>';
    container.style.display = '';
    parentItem.classList.add('open');

    var params = [];
    if (catalog) params.push('catalog=' + encodeURIComponent(catalog));
    if (schema)  params.push('schema='  + encodeURIComponent(schema));
    var qs = params.length ? '?' + params.join('&') : '';

    api.get('/api/datasources/' + encodeURIComponent(state.currentDs) + '/tables' + qs)
      .then(function (tables) {
        container.innerHTML = '';
        if (!tables.length) {
          container.innerHTML = '<li class="tree-loading">No tables</li>';
          return;
        }
        tables.forEach(function (t) {
          var icon = t.type === 'VIEW' ? '👁' : '📋';
          var li = makeTreeItem(icon, t.name, t.type, 'table', null);
          li.dataset.catalog = catalog || '';
          li.dataset.schema  = schema  || '';
          li.dataset.table   = t.name;

          var children2 = document.createElement('ul');
          children2.className = 'tree-children';
          children2.style.display = 'none';
          li.appendChild(children2);

          var item2 = li.querySelector('.tree-item');

          // Single click: load columns (expand)
          item2.addEventListener('click', function (e) {
            e.stopPropagation();
            var isOpen2 = children2.style.display !== 'none';
            if (isOpen2) {
              children2.style.display = 'none';
              item2.classList.remove('open');
            } else {
              if (children2.childElementCount === 0) {
                loadColumns(catalog, schema, t.name, children2, item2);
              } else {
                children2.style.display = '';
                item2.classList.add('open');
              }
            }
          });

          // Double click: preview data
          item2.addEventListener('dblclick', function (e) {
            e.stopPropagation();
            App.previewTable(catalog, schema, t.name);
          });

          // Right click: context menu
          item2.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            showContextMenu(e.clientX, e.clientY, [
              { label: '▶  Preview data', action: function () { App.previewTable(catalog, schema, t.name); } },
              { label: '📋  Copy table name', action: function () { copyToClipboard(t.name); } },
              { sep: true },
              { label: '🔍  Show columns', action: function () {
                  children2.style.display = 'none'; item2.classList.remove('open');
                  children2.innerHTML = '';
                  loadColumns(catalog, schema, t.name, children2, item2);
                }
              },
              { label: '📊  Show indexes', action: function () {
                  loadIndexes(catalog, schema, t.name);
                }
              }
            ]);
          });

          container.appendChild(li);
        });
      })
      .catch(function (e) {
        container.innerHTML = '<li class="tree-loading" style="color:#f38ba8">Error: ' + escHtml(e.message) + '</li>';
      });
  }

  function loadColumns(catalog, schema, table, container, parentItem) {
    container.innerHTML = '<li class="tree-loading">Loading…</li>';
    container.style.display = '';
    parentItem.classList.add('open');

    var params = [];
    if (catalog) params.push('catalog=' + encodeURIComponent(catalog));
    if (schema)  params.push('schema='  + encodeURIComponent(schema));
    params.push('table=' + encodeURIComponent(table));

    api.get('/api/datasources/' + encodeURIComponent(state.currentDs) + '/columns?' + params.join('&'))
      .then(function (cols) {
        container.innerHTML = '';
        cols.forEach(function (col) {
          var icon = col.primaryKey ? '🔑' : (col.nullable ? '◌' : '●');
          var li = makeTreeItem(icon, col.name, col.typeName + (col.columnSize ? '(' + col.columnSize + ')' : ''), 'column', null);
          var item = li.querySelector('.tree-item');
          if (col.primaryKey) item.classList.add('col-pk');
          else if (col.nullable) item.querySelector('.label').style.color = '#a6adc8';
          item.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            showContextMenu(e.clientX, e.clientY, [
              { label: '📋  Copy column name', action: function () { copyToClipboard(col.name); } },
              { label: '📋  Copy qualified name', action: function () { copyToClipboard('"'+table+'"."'+col.name+'"'); } }
            ]);
          });
          container.appendChild(li);
        });
      })
      .catch(function (e) {
        container.innerHTML = '<li class="tree-loading" style="color:#f38ba8">Error: ' + escHtml(e.message) + '</li>';
      });
  }

  function loadIndexes(catalog, schema, table) {
    var params = [];
    if (catalog) params.push('catalog=' + encodeURIComponent(catalog));
    if (schema)  params.push('schema='  + encodeURIComponent(schema));
    params.push('table=' + encodeURIComponent(table));

    api.get('/api/datasources/' + encodeURIComponent(state.currentDs) + '/indexes?' + params.join('&'))
      .then(function (indexes) {
        if (!indexes.length) {
          setResultsInfo('<span>No indexes on <b>' + escHtml(table) + '</b></span>');
          document.getElementById('results-body').innerHTML =
            '<div class="empty-state"><p>No indexes found on ' + escHtml(table) + '</p></div>';
          return;
        }
        var fakeResult = {
          type: 'SELECT',
          columns: ['INDEX_NAME', 'COLUMN_NAME', 'UNIQUE', 'ASC_OR_DESC'],
          rows: indexes.map(function (i) {
            return [i.name, i.columnName, String(i.unique), i.ascOrDesc || ''];
          }),
          executionTimeMs: 0
        };
        state.lastResult = fakeResult;
        App.renderResult(fakeResult);
        setResultsInfo('<span>Indexes on <b>' + escHtml(table) + '</b>  ·  ' + indexes.length + ' index(es)</span>');
      });
  }

  function makeTreeItem(icon, label, badge, type, extra) {
    var li = document.createElement('li');
    li.className = 'tree-node';

    var div = document.createElement('div');
    div.className = 'tree-item';

    var arrow = document.createElement('span');
    arrow.className = 'arrow';
    if (type !== 'column') arrow.textContent = '›';
    div.appendChild(arrow);

    var ic = document.createElement('span');
    ic.className = 'icon';
    ic.textContent = icon;
    div.appendChild(ic);

    var lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = label;
    div.appendChild(lbl);

    if (badge) {
      var b = document.createElement('span');
      b.className = 'type-badge';
      b.textContent = badge;
      div.appendChild(b);
    }

    li.appendChild(div);
    return li;
  }

  function setupToggle(li) {
    var children = li.querySelector('.tree-children');
    if (!children) return;
    var item = li.querySelector('.tree-item');
    item.addEventListener('click', function (e) {
      e.stopPropagation();
      if (children.style.display === 'none') {
        children.style.display = '';
        item.classList.add('open');
      } else {
        children.style.display = 'none';
        item.classList.remove('open');
      }
    });
  }

  function addSchemaOption(sel, catalog, schema) {
    var opt = document.createElement('option');
    opt.value = schema || '';
    opt.textContent = (catalog ? catalog + '.' : '') + (schema || '(default)');
    sel.appendChild(opt);
  }

  /* ═══════════════════════════════════════════════════════════
   *  Context menu
   * ═══════════════════════════════════════════════════════════ */
  function setupContextMenu() {
    document.addEventListener('click', function () {
      document.getElementById('ctx-menu').style.display = 'none';
    });
  }

  function showContextMenu(x, y, items) {
    var menu = document.getElementById('ctx-menu');
    menu.innerHTML = '';
    items.forEach(function (item) {
      if (item.sep) {
        var sep = document.createElement('div');
        sep.className = 'ctx-sep';
        menu.appendChild(sep);
      } else {
        var div = document.createElement('div');
        div.className = 'ctx-item';
        div.textContent = item.label;
        div.addEventListener('click', function (e) {
          e.stopPropagation();
          menu.style.display = 'none';
          item.action();
        });
        menu.appendChild(div);
      }
    });
    menu.style.display = '';
    menu.style.left = Math.min(x, window.innerWidth  - menu.offsetWidth  - 8) + 'px';
    menu.style.top  = Math.min(y, window.innerHeight - menu.offsetHeight - 8) + 'px';
  }

  /* ═══════════════════════════════════════════════════════════
   *  Datasource select handler
   * ═══════════════════════════════════════════════════════════ */
  document.getElementById('ds-select').addEventListener('change', function () {
    App.selectDatasource(this.value);
  });

  /* ═══════════════════════════════════════════════════════════
   *  Resizers
   * ═══════════════════════════════════════════════════════════ */
  function setupResizers() {
    /* Sidebar horizontal resize */
    var sidebarResize = document.getElementById('sidebar-resize');
    var sidebar = document.getElementById('sidebar');
    var sidebarDragging = false;
    var sidebarStartX, sidebarStartW;

    sidebarResize.addEventListener('mousedown', function (e) {
      sidebarDragging = true;
      sidebarStartX = e.clientX;
      sidebarStartW = sidebar.offsetWidth;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'col-resize';
    });
    document.addEventListener('mousemove', function (e) {
      if (!sidebarDragging) return;
      var w = sidebarStartW + (e.clientX - sidebarStartX);
      w = Math.max(140, Math.min(420, w));
      sidebar.style.width = w + 'px';
    });
    document.addEventListener('mouseup', function () {
      if (sidebarDragging) {
        sidebarDragging = false;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      }
    });

    /* Editor / Results vertical resize */
    var editorResize = document.getElementById('editor-resize');
    var editorPanel  = document.getElementById('editor-panel');
    var editorDragging = false;
    var editorStartY, editorStartH;

    editorResize.addEventListener('mousedown', function (e) {
      editorDragging = true;
      editorStartY = e.clientY;
      editorStartH = editorPanel.offsetHeight;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'row-resize';
    });
    document.addEventListener('mousemove', function (e) {
      if (!editorDragging) return;
      var h = editorStartH + (e.clientY - editorStartY);
      h = Math.max(80, Math.min(window.innerHeight - 160, h));
      editorPanel.style.flex = 'none';
      editorPanel.style.height = h + 'px';
      if (editor) editor.refresh();
    });
    document.addEventListener('mouseup', function () {
      if (editorDragging) {
        editorDragging = false;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      }
    });
  }

  /* ═══════════════════════════════════════════════════════════
   *  Utility
   * ═══════════════════════════════════════════════════════════ */
  function setStatus(msg) {
    document.getElementById('header-status').textContent = msg;
  }

  function setResultsInfo(html) {
    document.getElementById('results-info').innerHTML = html;
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  /* ═══════════════════════════════════════════════════════════
   *  Boot
   * ═══════════════════════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', function () { App.init(); });

})();
</script>
